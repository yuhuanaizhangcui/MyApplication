<svg role="img" aria-labelledby="stella-title stella-desc" viewBox="0 0 680 520" xmlns="http://www.w3.org/2000/svg">
  <title id="stella-title">Stella 健康应用界面设计</title>
  <desc id="stella-desc">Stella 健康追踪应用的四个主要页面：首页、日记、心愿单和心理</desc>
  
