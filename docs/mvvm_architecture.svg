<svg role="img" aria-labelledby="arch-title arch-desc" viewBox="0 0 680 500" xmlns="http://www.w3.org/2000/svg">
  <title id="arch-title">Stella 应用 MVVM 架构图</title>
  <desc id="arch-desc">Stella 健康应用的 MVVM 架构分层展示：UI层、ViewModel层、Repository层和数据库层</desc>
  
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  
  <!-- 外层容器 -->
  <rect x="40" y="30" width="600" height="440" rx="20" fill="#F1EFE8" stroke="#D3D1C7" stroke-width="0.5"/>
  
  <!-- 标题 -->
  <text x="340" y="20" class="th" font-family="system-ui" font-size="14" fill="#444441" text-anchor="middle">MVVM Architecture</text>
  
  <!-- ========== UI Layer ========== -->
  <g transform="translate(60, 50)">
    <rect x="0" y="0" width="560" height="80" rx="12" fill="#EEEDFE" stroke="#CECBF6" stroke-width="0.5"/>
    <text x="20" y="20" class="th" font-family="system-ui" font-size="13" fill="#3C3489">UI Layer</text>
    <text x="90" y="20" class="ts" font-family="system-ui" font-size="11" fill="#7F77DD">Jetpack Compose</text>
    
    <!-- 屏幕组件 -->
    <rect x="20" y="35" width="85" height="35" rx="8" fill="#FFFFFF" stroke="#AFA9EC" stroke-width="0.5"/>
    <text x="62" y="56" class="ts" font-family="system-ui" font-size="12" fill="#444441" text-anchor="middle" dominant-baseline="central">HomeScreen</text>
    
    <rect x="115" y="35" width="85" height="35" rx="8" fill="#FFFFFF" stroke="#AFA9EC" stroke-width="0.5"/>
    <text x="157" y="56" class="ts" font-family="system-ui" font-size="12" fill="#444441" text-anchor="middle" dominant-baseline="central">DiaryScreen</text>
    
    <rect x="210" y="35" width="85" height="35" rx="8" fill="#FFFFFF" stroke="#AFA9EC" stroke-width="0.5"/>
    <text x="252" y="56" class="ts" font-family="system-ui" font-size="12" fill="#444441" text-anchor="middle" dominant-baseline="central">WishScreen</text>
    
    <rect x="305" y="35" width="85" height="35" rx="8" fill="#FFFFFF" stroke="#AFA9EC" stroke-width="0.5"/>
    <text x="347" y="56" class="ts" font-family="system-ui" font-size="12" fill="#444441" text-anchor="middle" dominant-baseline="central">MindScreen</text>
    
    <rect x="400" y="35" width="85" height="35" rx="8" fill="#FFFFFF" stroke="#AFA9EC" stroke-width="0.5"/>
    <text x="442" y="56" class="ts" font-family="system-ui" font-size="12" fill="#444441" text-anchor="middle" dominant-baseline="central">ProfileScreen</text>
  </g>
  
  <!-- 连接线 1 -->
  <path d="M340 130 L340 150" stroke="#888780" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  
  <!-- ========== ViewModel Layer ========== -->
  <g transform="translate(60, 160)">
    <rect x="0" y="0" width="560" height="60" rx="12" fill="#E1F5EE" stroke="#9FE1CB" stroke-width="0.5"/>
    <text x="20" y="20" class="th" font-family="system-ui" font-size="13" fill="#085041">ViewModel Layer</text>
    
    <!-- ViewModel -->
    <rect x="200" y="12" width="160" height="36" rx="8" fill="#FFFFFF" stroke="#5DCAA5" stroke-width="1"/>
    <text x="280" y="34" class="th" font-family="system-ui" font-size="13" fill="#0F6E56" text-anchor="middle" dominant-baseline="central">StellaViewModel</text>
    
    <text x="400" y="30" class="ts" font-family="system-ui" font-size="11" fill="#1D9E75">StateFlow / Coroutines</text>
  </g>
  
  <!-- 连接线 2 -->
  <path d="M340 220 L340 240" stroke="#888780" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  
  <!-- ========== Data Layer ========== -->
  <g transform="translate(60, 250)">
    <rect x="0" y="0" width="560" height="60" rx="12" fill="#FAEEDA" stroke="#FAC775" stroke-width="0.5"/>
    <text x="20" y="20" class="th" font-family="system-ui" font-size="13" fill="#633806">Data Layer</text>
    
    <!-- Repository -->
    <rect x="200" y="12" width="160" height="36" rx="8" fill="#FFFFFF" stroke="#EF9F27" stroke-width="1"/>
    <text x="280" y="34" class="th" font-family="system-ui" font-size="13" fill="#854F0B" text-anchor="middle" dominant-baseline="central">StellaRepository</text>
  </g>
  
  <!-- 连接线 3 -->
  <path d="M340 310 L340 330" stroke="#888780" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  
  <!-- ========== Persistence Layer ========== -->
  <g transform="translate(60, 340)">
    <rect x="0" y="0" width="560" height="110" rx="12" fill="#E6F1FB" stroke="#B5D4F4" stroke-width="0.5"/>
    <text x="20" y="20" class="th" font-family="system-ui" font-size="13" fill="#0C447C">Persistence Layer</text>
    <text x="130" y="20" class="ts" font-family="system-ui" font-size="11" fill="#378ADD">Room Database</text>
    
    <!-- Database -->
    <rect x="20" y="35" width="140" height="65" rx="8" fill="#FFFFFF" stroke="#85B7EB" stroke-width="1"/>
    <text x="90" y="55" class="th" font-family="system-ui" font-size="12" fill="#185FA5" text-anchor="middle" dominant-baseline="central">StellaDatabase</text>
    <text x="90" y="75" class="ts" font-family="system-ui" font-size="10" fill="#888780" text-anchor="middle" dominant-baseline="central">SQLite</text>
    
    <!-- DAO 1 -->
    <rect x="180" y="35" width="110" height="65" rx="8" fill="#FFFFFF" stroke="#7F77DD" stroke-width="0.5"/>
    <text x="235" y="60" class="ts" font-family="system-ui" font-size="12" fill="#534AB7" text-anchor="middle" dominant-baseline="central">DiaryEntry</text>
    <text x="235" y="78" class="ts" font-family="system-ui" font-size="10" fill="#888780" text-anchor="middle" dominant-baseline="central">Dao</text>
    
    <!-- DAO 2 -->
    <rect x="310" y="35" width="110" height="65" rx="8" fill="#FFFFFF" stroke="#7F77DD" stroke-width="0.5"/>
    <text x="365" y="60" class="ts" font-family="system-ui" font-size="12" fill="#534AB7" text-anchor="middle" dominant-baseline="central">Wish</text>
    <text x="365" y="78" class="ts" font-family="system-ui" font-size="10" fill="#888780" text-anchor="middle" dominant-baseline="central">Dao</text>
    
    <!-- DAO 3 -->
    <rect x="440" y="35" width="100" height="65" rx="8" fill="#FFFFFF" stroke="#7F77DD" stroke-width="0.5"/>
    <text x="490" y="60" class="ts" font-family="system-ui" font-size="12" fill="#534AB7" text-anchor="middle" dominant-baseline="central">Meditation</text>
    <text x="490" y="78" class="ts" font-family="system-ui" font-size="10" fill="#888780" text-anchor="middle" dominant-baseline="central">Dao</text>
    
    <!-- 连接线到 DAO -->
    <path d="M160 70 L180 70" stroke="#85B7EB" stroke-width="1" fill="none" marker-end="url(#arrow)"/>
    <path d="M290 70 L310 70" stroke="#85B7EB" stroke-width="1" fill="none" marker-end="url(#arrow)"/>
    <path d="M420 70 L440 70" stroke="#85B7EB" stroke-width="1" fill="none" marker-end="url(#arrow)"/>
  </g>
  
  <!-- 数据流说明 -->
  <text x="60" y="480" class="ts" font-family="system-ui" font-size="11" fill="#888780">单向数据流: UI → ViewModel → Repository → Database</text>
  <text x="520" y="480" class="ts" font-family="system-ui" font-size="11" fill="#888780">StateFlow 响应式更新</text>
</svg>
